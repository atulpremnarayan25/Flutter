name: pokedesk
description: PokéDesk - Your ultimate Pokédex companion app

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  http: ^1.2.0
  lottie: ^2.7.0
  google_fonts: ^6.2.0
  flutter_spinkit: ^5.2.0
  shared_preferences: ^2.3.2
  cached_network_image: ^3.3.1

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/pokeball.json